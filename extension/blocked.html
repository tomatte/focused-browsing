<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Site bloqueado — Focused Browsing</title>
    <link rel="stylesheet" href="blocked.css" />
  </head>
  <body>
    <main>
      <div class="icon" aria-hidden="true">⛔</div>
      <h1>Site bloqueado</h1>
      <p id="message">O acesso a esta página foi bloqueado pelo <strong>Focused Browsing</strong>.</p>
      <p id="detail" class="domain-hint hidden"></p>
      <p class="actions">
        Para gerenciar suas listas de bloqueio, abra o ícone da extensão na barra do navegador.
      </p>
      <button type="button" id="back-btn">Voltar</button>
    </main>
    <script src="blocked.js"></script>
  </body>
</html>
